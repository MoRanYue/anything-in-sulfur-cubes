# Anything in Sulfur Cubes - Plugin Configuration
# Block archetype mappings and custom behavior settings.

behaviors:
  # Cactus damage behavior
  cactus:
    enabled: true
    damage: 1.0
    range: 1.35
  # Creaking heart periodic sound behavior
  creaking-heart:
    enabled: true
    timer-min: 40
    timer-max: 100
  # Potent sulfur nausea effect
  potent-sulfur:
    enabled: true
    duration-seconds: 5
    amplifier: 1
    range: 1.35
  # Transparency notification
  transparency-notify:
    enabled: true

# Transparent blocks that trigger the notification
transparency-blocks:
  - glass
  - white_stained_glass
  - orange_stained_glass
  - magenta_stained_glass
  - light_blue_stained_glass
  - yellow_stained_glass
  - lime_stained_glass
  - pink_stained_glass
  - gray_stained_glass
  - light_gray_stained_glass
  - cyan_stained_glass
  - purple_stained_glass
  - blue_stained_glass
  - brown_stained_glass
  - green_stained_glass
  - red_stained_glass
  - black_stained_glass
  - ice
  - slime_block
  - honey_block

