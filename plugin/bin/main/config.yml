# Anything in Sulfur Cubes - Plugin Configuration
# Behavior settings for custom sulfur cube abilities.
# Block-to-archetype mappings are now handled by the bootstrap phase
# via AnythingInSulfurCubesBootstrap using the registry compose event system.

behaviors:
  # Cactus damage behavior
  cactus:
    enabled: true
    damage: 1.0
    range: 1.35
  # Creaking heart periodic sound behavior
  creaking-heart:
    enabled: true
    timer-min: 40
    timer-max: 100
  # Potent sulfur nausea effect
  potent-sulfur:
    enabled: true
    duration-seconds: 5
    amplifier: 1
    range: 1.35
